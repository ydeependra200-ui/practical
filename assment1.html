
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Marks System</title>
  <link rel="stylesheet" href="assement1.css">
</head>
<body>
  <div class="container">

    <h1>Student Marks Management</h1>
    <div class="input-section">
      <h2>Add New Student</h2>
      
      <div class="form-grid">
        <div>
          <label>Student Name:</label>
          <input type="text" id="name" placeholder="e.g. Vishal Mishra">
        </div>
        <div>
          <label>Roll Number:</label>
          <input type="text" id="roll" placeholder="e.g. 101">
        </div>
        <div>
          <label>Math:</label>
          <input type="number" id="math" min="0" max="100" placeholder="0-100">
        </div>
        <div>
          <label>Science:</label>
          <input type="number" id="science" min="0" max="100" placeholder="0-100">
        </div>
        <div>
          <label>English:</label>
          <input type="number" id="english" min="0" max="100" placeholder="0-100">
        </div>
      </div>

      <button id="addBtn">Add Student</button>
    </div>
    <div class="controls">
      <button id="showAll">Show All Students</button>
      <button id="showTotals">Show Total Marks</button>
      <button id="showAverages">Show Averages</button>
      <button id="showTop">Students Above 80%</button>
      <button id="showFailed">Failed Students (<40%)</button>
      <button id="countStudents">Count Students</button>
      <button id="clearDisplay">Clear Display</button>
    </div>
    <div id="output" class="output-area"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
